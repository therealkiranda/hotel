name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /var/www/grand-lumiere
            git pull origin main
            cd frontend
            npm install
            npm run build
            cd ../backend
            npm install --production
            pm2 restart grandlumiere-api
            echo "Deploy completed!"
