# CloudPanel Nginx vHost config for hotel.primelogic.com.np
# Add these location blocks inside your server {} block

# Serve React build from dist/
root /home/grandlumiere/htdocs/hotel.primelogic.com.np;
index index.html;

# React Router — all routes serve index.html
location / {
    try_files $uri $uri/ /index.html;
}

# Cache hashed assets forever
location /assets/ {
    expires max;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# Cache uploaded media
location /uploads/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
}

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
